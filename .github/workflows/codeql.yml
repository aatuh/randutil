name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "25 4 * * 6"

permissions: {}

jobs:
  analyze:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.3
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.31.10
        with:
          languages: go
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.31.10
      - name: Analyze
        uses: github/codeql-action/analyze@v4.31.10
