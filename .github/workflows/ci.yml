name: Go CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions: {}

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.3
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Dependency Review
        uses: actions/dependency-review-action@v5.0.0

  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.3
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify Tools
        run: make tools
      - name: Tidy
        run: |
          make tidy
          git diff --exit-code || (echo "run go mod tidy"; exit 1)
      - name: Vet
        run: make vet
      - name: Lint
        run: make lint
      - name: Govulncheck
        id: govulncheck
        run: ./.tools/bin/govulncheck -format sarif ./... > govulncheck.sarif
        continue-on-error: true
      - name: Normalize govulncheck SARIF
        if: always() && hashFiles('govulncheck.sarif') != ''
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("govulncheck.sarif")
          data = json.loads(path.read_text())
          for run in data.get("runs", []):
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  props = rule.get("properties")
                  if not isinstance(props, dict):
                      continue
                  tags = props.get("tags")
                  if isinstance(tags, list):
                      props["tags"] = list(dict.fromkeys(tags))
          path.write_text(json.dumps(data, separators=(",", ":")))
          PY
      - name: Upload govulncheck SARIF
        if: always() && hashFiles('govulncheck.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck
      - name: Fail on govulncheck issues
        if: steps.govulncheck.outcome == 'failure'
        run: exit 1
      - name: Gosec
        id: gosec
        run: ./.tools/bin/gosec -fmt=sarif -out=gosec.sarif ./...
        continue-on-error: true
      - name: Normalize gosec SARIF
        if: always() && hashFiles('gosec.sarif') != ''
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("gosec.sarif")
          data = json.loads(path.read_text())
          for run in data.get("runs", []):
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  props = rule.get("properties")
                  if not isinstance(props, dict):
                      continue
                  tags = props.get("tags")
                  if isinstance(tags, list):
                      props["tags"] = list(dict.fromkeys(tags))
          path.write_text(json.dumps(data, separators=(",", ":")))
          PY
      - name: Upload gosec SARIF
        if: always() && hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: gosec.sarif
          category: gosec
      - name: Fail on gosec issues
        if: steps.gosec.outcome == 'failure'
        run: exit 1
      - name: Unit tests (race + coverage)
        run: |
          go test ./... -race -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out
      - name: Unit tests (ci tag)
        run: go test ./... -tags=randutil_ci
      - name: Unit tests (must tag)
        run: go test ./... -tags=randutil_must
      - name: Fuzz smoke
        run: make fuzz-smoke
